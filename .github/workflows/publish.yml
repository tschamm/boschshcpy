name: Publish to PyPI

# Builds and publishes to PyPI on a version tag, using PyPI Trusted Publishing
# (OIDC) — no API token/secret stored in the repo.
#
# ONE-TIME SETUP (PyPI side): on https://pypi.org/manage/project/boschshcpy/settings/publishing/
# add a GitHub trusted publisher: owner=tschamm, repo=boschshcpy,
# workflow=publish.yml. After that, pushing a `vX.Y.Z` tag publishes automatically.

on:
  push:
    tags: ["v*"]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
