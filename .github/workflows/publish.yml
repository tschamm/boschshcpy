name: Publish to PyPI

# Publishes to PyPI via PyPI Trusted Publishing (OIDC) — no API token/secret.
#
# DISABLED ON TAGS until the trusted publisher is configured PyPI-side. The
# project Owner (tschamm) must add it once at
# https://pypi.org/manage/project/boschshcpy/settings/publishing/ —
# provider GitHub, owner=tschamm, repo=boschshcpy, workflow=publish.yml,
# environment blank. Auto-publishing on a tag without that config only produces
# a red "invalid-publisher" run, so until then releases are published manually
# (twine) and this workflow is run on demand via "Run workflow".
#
# AFTER the trusted publisher exists: switch the trigger back to
#   on:\n    push:\n      tags: ["v*"]
# and tag-pushes will publish automatically (and `skip-existing` keeps it green
# if a version was already uploaded manually).

on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Tolerate a version that was already uploaded (e.g. via the manual
          # twine fallback during the OIDC transition) instead of failing.
          skip-existing: true
