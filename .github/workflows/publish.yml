name: Publish to PyPI and GitHub Release

# Three-job build → publish → release, mirroring the camera-tool release pipeline.
# Publishes via PyPI Trusted Publishing (OIDC) — no API token/secret.
#
# TRIGGER: tag push (v*.*.*) → OIDC publish via PyPI Trusted Publisher.
# Trusted Publisher registered by tschamm at:
#   https://pypi.org/manage/project/boschshcpy/settings/publishing/
#   provider GitHub · owner=tschamm · repo=boschshcpy ·
#   workflow=publish.yml · environment=pypi
# `skip-existing: true` keeps it green if a version was already uploaded
# manually (e.g. the 0.3.22 twine fallback during OIDC transition).

on:
  workflow_dispatch:
  push:
    tags: ["v*.*.*"]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install build
        run: python -m pip install --upgrade build
      - name: Build wheel and sdist
        run: python -m build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Tolerate a version already uploaded via the manual twine fallback.
          skip-existing: true

  release:
    name: Publish GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Create GitHub release (idempotent, auto-notes)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists — leaving untouched."
          else
            gh release create "$TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --title "${TAG#v}" \
              --generate-notes
          fi
